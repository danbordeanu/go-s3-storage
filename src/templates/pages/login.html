{{define "login"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - S3 Storage</title>
    <link rel="stylesheet" href="/ui/static/css/styles.css">
</head>
<body class="bg-gradient-primary min-h-screen flex flex-col">
    <main class="flex-grow flex items-center justify-center">
        <div class="max-w-md w-full mx-4">
            <div class="bg-white rounded-lg shadow-lg p-8">
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-primary rounded-full mb-4">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path>
                        </svg>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-800">S3 St🍊rage</h1>
                    <p class="text-gray-500 mt-2">Sign in to your account</p>
                </div>

                {{if .Error}}
                <div class="bg-red-50 text-red-700 px-4 py-3 rounded-lg mb-6 border border-red-200">
                    <div class="flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path>
                        </svg>
                        {{.Error}}
                    </div>
                </div>
                {{end}}

                <form action="/ui/login" method="POST">
                    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

                    <div class="mb-4">
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <input type="text" id="username" name="username" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 ring-primary focus:border-transparent"
                            placeholder="Enter your username" value="{{.Username}}">
                    </div>

                    <div class="mb-6">
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="password" name="password" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 ring-primary focus:border-transparent"
                            placeholder="Enter your password">
                    </div>

                    <button type="submit"
                        class="w-full bg-primary text-white py-2 px-4 rounded-lg hover:bg-primary-hover focus:outline-none focus:ring-2 ring-primary focus:ring-offset-2 transition-colors font-medium">
                        Sign In
                    </button>
                </form>
            </div>
            <p class="text-center text-gray-500 text-sm mt-4">
                S3-compatible object storage
            </p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-4 mt-5" style="background: #fff3e0;">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-wrap items-center">
                <div class="w-full md:w-1/2 text-center md:text-left mb-3 md:mb-0">
                    <div class="font-semibold text-gray-800">
                        © 2026 Almeria Industries MFT
                    </div>
                    <div class="text-gray-500 text-sm">
                        Contact:
                        <a href="mailto:sales@almeriaindustries.com" class="text-gray-500 hover:text-gray-700">
                            sales@almeriaindustries.com
                        </a>
                    </div>
                </div>
                <div class="w-full md:w-1/2 text-center md:text-right">
                    <a href="http://almeriaindustries.com" class="text-gray-500 hover:text-gray-700 mr-3">Home</a>
                    <a href="https://www.postman.com/almeriaindustries/almeria/collection/kec0nx2/almeria-industries-api" class="text-gray-500 hover:text-gray-700 mr-3">Docs</a>
                    <a href="https://almeriaindustries.com/terms.html" class="text-gray-500 hover:text-gray-700">Privacy Policy</a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
{{end}}
